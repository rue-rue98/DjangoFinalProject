{% extends 'base.html' %}

{% block title %}Password Reset{% endblock %}

{% block content %}
  <h1 class="mb-3">Reset Password</h1>
  <form method="post" class="mb-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Send Reset Email</button>
  </form>
{% endblock %}
