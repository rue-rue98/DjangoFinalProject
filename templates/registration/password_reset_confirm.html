{% extends 'base.html' %}

{% block title %}Set New Password{% endblock %}

{% block content %}
  <h1 class="mb-3">Set A New Password</h1>
  <form method="post" class="mb-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Change Password</button>
  </form>
{% endblock %}
