{% extends 'base.html' %}

{% block title %}Boards{% endblock %}

{% block content %}
  <h1 class="mb-4">Discussion Boards</h1>

  <div class="list-group">
    {% for board in boards %}
      <a class="list-group-item list-group-item-action" href="{% url 'board_topics' board.pk %}">
        <h5 class="mb-1">{{ board.name }}</h5>
        <p class="mb-0">{{ board.description }}</p>
      </a>
    {% empty %}
      <div class="alert alert-info">No Boards Yet.</div>
    {% endfor %}
  </div>
{% endblock %}
